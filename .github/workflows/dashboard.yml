# Render the Cartouche repo dashboard (vellum-davinci) into assets/.
#
# Runs every 6 hours, regenerates the SVG, and commits it back if anything
# changed. Embedded in README.md via a <picture> tag with prefers-color-scheme.
#
# Security note: untrusted-context values are NEVER interpolated directly
# into `run:` blocks. The only ${{ }} expansion below targets
# `github.repository`, which GitHub sets itself, and is still routed via
# `env:` so anyone extending this template (e.g. adding a PR title) starts
# from a non-injectable baseline.

name: Cartouche dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/dashboard.yml"

permissions:
  contents: write

concurrency:
  group: cartouche-dashboard
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Cartouche
        run: pip install "cartouche-svg>=0.2.1"

      - name: Render light + dark variants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p assets
          cartouche repo "$REPO" \
            --theme vellum-davinci-light \
            --out assets/dashboard-light.svg
          cartouche repo "$REPO" \
            --theme vellum-davinci-dark \
            --out assets/dashboard-dark.svg

      - name: Commit if changed
        run: |
          if [[ -n $(git status --porcelain assets/) ]]; then
            git config user.name "cartouche-bot"
            git config user.email "cartouche-bot@users.noreply.github.com"
            git add assets/
            git commit -m "chore(cartouche): refresh repo dashboard"
            git push
          else
            echo "No dashboard changes."
          fi
